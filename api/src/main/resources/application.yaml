# Base configuration — applies to ALL profiles (dev and prod)
# Values with ${...} are read from environment variables
# The part after the colon is the default if the variable isn't set

spring:
  application:
    name: featureflag-api

  # Database connection
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/featureflag}
    username: ${SPRING_DATASOURCE_USERNAME:maher}
    password: ${SPRING_DATASOURCE_PASSWORD:icarus}
    # HikariCP connection pool — always configure this explicitly
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000   # 30 seconds
      idle-timeout: 600000        # 10 minutes

  # JPA / Hibernate
  jpa:
    hibernate:
      # validate = Hibernate checks the schema matches entities but
      # does NOT modify the database — Flyway handles all schema changes
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # Redis connection
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      # Connection pool for Redis
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # Flyway database migrations
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# Spring Boot Actuator — exposes /actuator/health and /actuator/info
# Used by Docker health checks and monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# Application logging
logging:
  level:
    com.featureflag: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN


jwt:
  secret: ${JWT_SECRET}