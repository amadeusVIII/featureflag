# Docker Compose V2 syntax — use "docker compose" not "docker-compose"
# This file defines the production-like environment.
# For local dev extras (ports, GUI tools), see docker-compose.override.yml

services:

  # ─────────────────────────────────────────────
  # NGINX — the front door of the entire system
  # Routing rules (defined in nginx/nginx.conf):
  #   /api/*   → proxied to api:8080
  #   /*       → proxied to frontend:80
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      api:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      # wget the root path — nginx serving the frontend, not the API health endpoint
      test: ["CMD", "wget", "-qO-", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─────────────────────────────────────────────
  # FRONTEND — React admin dashboard
  # Built from frontend/Dockerfile (multi-stage: node build → nginx serve)
  # Nginx inside the frontend container serves static files only.
  # The outer Nginx (above) routes browser requests here.
  # ─────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Tells Vite where the API is at build time.
        # At runtime in Docker, /api is handled by the outer Nginx reverse proxy.
        VITE_API_URL: /api
    # No ports exposed — traffic comes through the outer Nginx only
    # This is a security best practice: the frontend is not directly reachable
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # API — the Spring Boot application
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/featureflag
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASS}
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_PROFILES_ACTIVE=prod
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # ─────────────────────────────────────────────
  # POSTGRESQL — the primary database
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: featureflag
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASS}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d featureflag"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────
  # REDIS — the caching layer
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: >
      redis-server
      --save 60 1
      --loglevel warning
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local