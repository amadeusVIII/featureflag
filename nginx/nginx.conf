# Nginx reverse proxy configuration
#
# This is the "outer" Nginx — the front door of the entire system.
# It sits in front of everything and routes requests:
#
#   Browser requests /api/v1/flags  → forwarded to api:8080
#   Browser requests /              → forwarded to frontend:80
#
# There are TWO nginx instances in this project:
#   1. This one (outer) — routes between services
#   2. The one inside the frontend container — serves static React files
#
# This two-layer setup means the API and frontend can be scaled independently.

events {
    worker_connections 1024;
}

http {
    # Timeouts — Spring Boot can take a moment on cold starts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    upstream api-backend {
        # "api" is the Docker Compose service name — Docker resolves it internally
        server api:8080;
    }

    upstream frontend-backend {
        server frontend:80;
    }

    server {
        listen 80;

        # ─── API routes ───────────────────────────────────────────────────────
        # Any request starting with /api goes to Spring Boot.
        # The SDK uses /api/v1/flags/evaluate
        # The admin dashboard uses /api/v1/admin/flags
        # Spring Actuator is at /actuator (for internal health checks only)
        location /api/ {
            proxy_pass         http://api-backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
        }

        location /actuator/ {
            # Actuator endpoints — only accessible from within Docker network
            # In production you'd block this from the public internet
            proxy_pass http://api-backend;
        }

        # ─── Frontend routes ──────────────────────────────────────────────────
        # Everything else goes to the React dashboard.
        # The frontend's own Nginx handles the SPA fallback (index.html).
        location / {
            proxy_pass         http://frontend-backend;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        }
    }
}
