# Nginx reverse proxy configuration
# This sits in front of our Spring Boot API and (later) the React frontend

events {
    # Maximum simultaneous connections nginx can handle
    worker_connections 1024;
}

http {

    # ─────────────────────────────────────────
    # Upstream blocks define backend servers
    # "api" here refers to the Docker service name
    # Docker's internal DNS resolves "api" to the
    # correct container IP automatically
    # ─────────────────────────────────────────
    upstream api_backend {
        server api:8080;
        # Later when we scale: docker compose up --scale api=3
        # Docker will load-balance across all 3 instances automatically
    }

    server {
        listen 80;

        # ─────────────────────────────────────
        # Health check endpoint for the nginx
        # container's own health check
        # ─────────────────────────────────────
        location /health {
            return 200 'healthy\n';
            add_header Content-Type text/plain;
        }

        # ─────────────────────────────────────
        # All /api/** and /actuator/** requests
        # go to the Spring Boot API
        # ─────────────────────────────────────
        location /api/ {
            proxy_pass http://api_backend;

            # Pass the real client IP to the API so it can log it
            proxy_set_header X-Real-IP $remote_addr;

            # Standard header that tells the API it's behind a proxy
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Pass the original host header
            proxy_set_header Host $host;

            # Timeout settings — how long to wait for the API to respond
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
        }

        location /actuator/ {
            # Actuator endpoints (/actuator/health, /actuator/metrics)
            # also route to the API backend
            proxy_pass http://api_backend;
            proxy_set_header Host $host;
        }

        # ─────────────────────────────────────
        # Everything else (/) will serve the
        # React frontend — we'll add this in
        # Step 12 when we build the frontend
        # ─────────────────────────────────────
        location / {
            # Placeholder — will serve React app in Step 12
            return 200 'FeatureFlag API is running\n';
            add_header Content-Type text/plain;
        }
    }
}