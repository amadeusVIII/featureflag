# Nginx config for a Single Page Application (SPA)
# The one critical rule: try_files $uri $uri/ /index.html
#
# Why this matters:
# React Router handles routing in the browser (client-side).
# But when the browser requests /flags directly (e.g., on page refresh),
# Nginx looks for a file called "flags" on disk — it doesn't exist.
# Without try_files, Nginx returns 404. With try_files, Nginx falls back
# to serving index.html, and React Router takes over to show the right page.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static assets with long cache headers
    # Vite generates content-hashed filenames (e.g. main.abc123.js)
    # so these files can be cached forever — new deployments = new hash = new URL
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # All other routes: serve index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
}